    "explainability",
    "self-test",
    "regression test suite",
    "impact scoring",
    "isolation guarantees",
    "task decomposition",
]
min_score = 0.35   # S4 floor

# ----- Analytical system questions: reasoning about system behavior, not lookups -----
# Eval 2026-04-12: 8 S4 prompts scored S0 because they're QUESTIONS not COMMANDS.
# "is the Brain actually saving money" needs Opus reasoning but has zero action verbs.
[guardrails.analytical_question_floor]
description = "Analytical questions about system behavior => S4 floor"
regex = [
    "(?i)(is the .{5,} actually|what is the actual .{5,} rate|can .{3,} craft .{3,} that|can .{3,} force the|model the cost|does .{5,} actually sav|mathematically impossible|counterintuitive|methodological consistency|produce consistent)"
]
min_score = 0.35   # S4 floor

# ----- System trace/analysis patterns: verbs that indicate deep investigation -----
# Eval 2026-04-12: "trace the full lifecycle", "replay all historical", "find every
# hardcoded" route S1-S2 but are S4 investigation tasks. S3 floor as safe minimum.
[guardrails.system_trace_floor]
description = "System trace/investigation patterns => S3 floor"
regex = [
    "(?i)\\b(trace the full|trace why|replay all|find every \\w+ed|identify the duplicated|detect and compensate|identify .{5,} patterns)\\b"
]
min_score = 0.25   # S3 floor

# ----- Feature-scope keywords: feature-level complexity signals always S3+ -----
# Eval 2026-04-12: "add middleware", "webhook retry", "database seeding" etc. describe
# S3 multi-concern work but use simple language the classifier reads as S0-S2.
[guardrails.feature_scope_floor]
description = "Feature-level technical terms => S3 floor"
keywords = [
    "middleware",
    "webhook retry",
    "dead letter queue",
    "backoff curve",
    "database seeding",
    "factory functions",
    "real-time presence",
    "presence indicators",
    "hot-reloadable",
    "hot-reload",
    "hot reload",
]
min_score = 0.25   # S3 floor

# ============================================================================
# Ceiling guardrails — CAP score when specificity patterns detected.
# Processed AFTER floor guardrails. Prevents over-routing of single-file edits.
# v2.6: added to recover S2 accuracy after GEPA threshold tuning.
# ============================================================================

# ----- Single-file scope ceiling: specific code references cap at S2 -----
# S2 prompts reference THIS function, THIS file, specific function(), flags.
# S3 prompts describe feature-level outcomes without specific code targets.
# This ceiling keeps single-file targeted edits in S2 after floors push to 0.22.
[ceiling_guardrails.single_file_scope_ceiling]
description = "Specific code reference (function(), this file, --flag, named artifact) => S2 ceiling"
regex = [
    "(?i)\\b(this function|this file|this CLI|this for-loop|in this file|in this function|all callers in this|all parameters in this|in this class)",
    "(?i)\\w+\\(\\)",
    "(?i)--[\\w-]+\\s+(flag|that\\s+skip|that\\s+print)",
    "(?i)\\b(refactor this|rename the \\w+ function|rename the \\w+ variable|rename variable|extract the hardcoded|replace the print|add type hints to)",
    "(?i)\\bthe\\s+\\w+\\s+function\\b",
    "(?i)\\b(for|to)\\s+the\\s+\\w+\\s+(enum|parser|schema|query|route|variable)\\b",
    "(?i)\\b(add|write)\\s+(a\\s+)?(docstring|try.except|unit test|input validation)\\s+(for|to|around)\\b",
    "(?i)/api/\\w+",
    "(?i)\\b(the Supabase query|the CSS so|add CORS|Pydantic model for)",
    "(?i)\\bthe\\s+[\\w.-]+\\.(?:py|json|jsonl|toml|yaml|yml|md|sh|txt|csv|log|sql|html|css)\\s+file\\b",
]
max_score = 0.21

# v2.6b: Short question prompts ceiling — prevents floor guardrails from over-routing
# factual questions. "how do I create a virtual environment" should not be S3 just
# because "create a" matches code_generation_floor. Only fires on short prompts
# (regex caps total length at ~70 chars). Verified zero S2+ matches in golden_set.
[ceiling_guardrails.simple_question_ceiling]
description = "Short question prompt (how do I, what does, explain) => S1 ceiling"
regex = [
    "(?i)^(how do I|how does|how can I|what does|what is|what are|what's the|explain what|explain how|explain the|what port|what error|when should|when to use|why does|why is)\\b.{0,45}$",
]
max_score = 0.15

