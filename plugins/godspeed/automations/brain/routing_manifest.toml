# ============================================================================
# v2.0: LEARNING — feedback loop configuration
# ============================================================================
# Brain reads telemetry (decisions.jsonl + tools.jsonl) to detect override events
# and correction follows, then proposes manifest weight adjustments. All updates
# are dry-run by default; the user applies them via `brain tune --write`.
[learning]
enabled = true
alpha = 0.005                   # EWMA learning rate — small for stability
skill_override_threshold = 5    # skills with 5+ overrides get auto-bumped
drift_threshold_pp = 10.0       # trigger drift alert when tier drifts >10 percentage points
correction_window_turns = 3     # look ahead N turns for correction follow-ups
confidence_low_threshold = 0.30 # mark decisions with confidence < this as low-confidence

# ============================================================================
# v2.0: BUDGET — session cost tracking and advisory thresholds
# ============================================================================
# Brain does NOT enforce these hard caps (it has no authority over Claude Code
# inference). It logs and warns when a session crosses thresholds so the user can
# make an informed decision. Cost is estimated from tool telemetry and current
# manifest pricing.
[budget]
enabled = true
session_warn_usd = 2.00         # advisory warn when session cost crosses this
session_alert_usd = 10.00       # stronger alert at this level
daily_warn_usd = 50.00          # daily warn threshold
daily_alert_usd = 150.00        # daily alert threshold

# ============================================================================
# v2.0: ADVISOR — integration with Anthropic advisor_20260301 (ecosystem slot)
# ============================================================================
# Anthropic launched the advisor_20260301 API tool on 2026-04-09:
#   https://platform.claude.com/docs/en/agents-and-tools/tool-use/advisor-tool
# The pattern INVERTS classical routing: small model drives, escalates to Opus
# via the `advisor` tool only when stuck. All in one /v1/messages request.
#
# Claude Code does NOT natively expose this tool as of 2026-04-10. When native
# /advisor support lands, Brain will detect it via `brain advisor-status` and
# auto-recommend advisor mode for tasks matching the pattern below.
#
# Until then, this section documents the integration contract for v3.
[advisor]
enabled_when_available = true
note = "advisor_20260301 API tool - not yet exposed via Claude Code slash command"
docs_url = "https://platform.claude.com/docs/en/agents-and-tools/tool-use/advisor-tool"
blog_url = "https://claude.com/blog/the-advisor-strategy"
beta_header = "anthropic-beta: advisor-tool-2026-03-01"

# Executor -> advisor pairings Brain will recommend
[[advisor.pairs]]
executor = "sonnet"
advisor = "opus"
best_for = "agentic tool-heavy sessions, multi-step debugging, research synthesis"

[[advisor.pairs]]
executor = "haiku"
advisor = "opus"
best_for = "BrowseComp-style lookup + reasoning, short agentic tasks"

# max_uses_default: safety cap on how many advisor consults per request
[advisor.config]
max_uses_default = 3
cache_ttl = "5m"

# v2.1: opusplan model alias — recommended for plan-heavy sessions
# Activates: /model opusplan at session start
# Behavior: Opus for planning phases, Sonnet for execution phases (auto-handoff)
# Cost: ~40% cheaper than full Opus, quality preserved on architecture decisions
# Discovered: 2026-04-11 Claude Code ecosystem research — Toke was not using this
# Best for: godspeed sessions, overnight work, multi-file refactors
[advisor.opusplan]
alias = "opusplan"
plan_model = "opus"
execute_model = "sonnet"
note = "Free cost win for plan-heavy sessions. Run /model opusplan at session start."

# ============================================================================
# v2.0: UNCERTAINTY ESCALATION
# ============================================================================
# When the classifier is uncertain (confidence < learning.confidence_low_threshold)
# AND no skill override applied AND no guardrail fired, Brain escalates one tier
# up for safety. Fail-open default (on manifest exception) is ALSO raised from
# S3 (Sonnet-high) to S4 (Opus-high) — quality over cost when we don't know.
[uncertainty]
escalate_on_low_confidence = true
fail_open_tier = "S4"
fail_open_model = "opus"
fail_open_effort = "high"
rationale = "Conservative: if we don't know, assume it's hard. Cost is recoverable, quality regression is not."

# ============================================================================
# v2.4: EFFORT MAP — Manual Effort Level Selector
# ============================================================================
# Maps effort 1-5 to deterministic Homer Pantheon engagement levels.
# the user sets effort manually; Brain still classifies for telemetry but the
# effort override is the final word. Delta (inferred vs override) feeds Aurora.
#
# Layers: L0=VAULT, L1=Brain, L2=Zeus, L3=MUSES, L4=Sybil, L5=Mnemos,
#         L6=Sleep, L7=Oracle
#
# State file: ~/.claude/telemetry/brain/effort_override.txt
# Set via: homer effort <1-5>  |  Clear via: homer effort reset
# ============================================================================

[effort_map.1]
description = "Direct answer — Brain only, no orchestration"
layers = ["L1"]
model = "sonnet"
muse_count = 0
oracle_mode = "off"
mnemos_mode = "off"
extended_thinking_budget = 0

[effort_map.2]
description = "Light orchestration — Zeus sequential, no parallel MUSES"
layers = ["L0", "L1", "L2"]
model = "sonnet"
muse_count = 0
oracle_mode = "off"
mnemos_mode = "checkpoint"
extended_thinking_budget = 0

[effort_map.3]
description = "Standard multi-agent — Zeus + 3 MUSES parallel + Sybil standby"
layers = ["L0", "L1", "L2", "L3", "L4", "L7"]
model = "opus"
muse_count = 3
oracle_mode = "light"
mnemos_mode = "checkpoint"
extended_thinking_budget = 16000

[effort_map.4]
description = "Deep multi-agent — full pipeline + Oracle strict + Mnemos full"
layers = ["L0", "L1", "L2", "L3", "L4", "L5", "L7"]
model = "opus"
muse_count = 3
oracle_mode = "strict"
mnemos_mode = "full"
extended_thinking_budget = 32000

[effort_map.5]
description = "Full Pantheon — every layer, max depth, sleep agents queue follow-ups"
layers = ["L0", "L1", "L2", "L3", "L4", "L5", "L6", "L7"]
model = "opus[1m]"
muse_count = 3
oracle_mode = "strict"
mnemos_mode = "full"
extended_thinking_budget = 64000
