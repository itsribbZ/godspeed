# ----- Informational question floor: "what/how/why/explain + short" => S1 floor -----
# Audit 2026-04-16 (gap_audit): S1 tier accuracy was 17% (2/12). Root cause:
# simple_question_ceiling caps MAX at 0.15 but base score for "what port does
# PostgreSQL use" is ~0.002 — ceiling never raises, prompts fell through to S0.
# Override rate on S1 was 41.5% because humans knew the classifier was wrong.
# This floor complements the existing ceiling: short info questions now land
# in S1 [0.09, 0.16) deterministically, and the ceiling prevents over-routing.
# Regex: (what|how|why|when|explain|show|when should|what's) + length cap ~90 chars.
# Length cap prevents long "explain how X interacts with Y, Z, and W across..." from
# being down-classified (those are legitimately S2+).
[guardrails.informational_question_floor]
description = "Short informational question (what/how/why/explain) => S1 floor"
regex = [
    "(?i)^(what|how|why|when|where|explain|show me|describe|tell me|what's|how's|why's|what is|how is|how do|how does|how can|what are|what does|when should|when to|why does|why is|explain what|explain how|explain the)\\b.{0,80}$",
]
min_score = 0.10   # S1 floor (just above s0_max=0.09, well below s2_max=0.22)

# ----- System scope floor: multi-component / ground-up work => S3 floor -----
# Audit 2026-04-11: Brain missed "from scratch", "entire", "diagnose", "overnight"
# These indicate S3+ complexity regardless of prompt length.
[guardrails.system_scope_floor]
description = "System-scope breadth marker => Sonnet-high floor"
