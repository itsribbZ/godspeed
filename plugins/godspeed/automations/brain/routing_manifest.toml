# ============================================================================
# Toke Brain — Routing Manifest
# ============================================================================
# Single source of truth for the severity classifier. All weights, thresholds,
# keyword lists, guardrails, and skill tier assignments live here.
#
# Edit this file to tune Brain's behavior — no code changes needed.
# Classifier reads this on every invocation (no caching) so changes are live.
#
# Design doc: Toke/research/brain_synthesis_2026-04-10.md
# ============================================================================

version = "2.6.2"
last_updated = "2026-04-12"
# v2.0 additions: [learning], [budget], [advisor] sections;
#                 extended_thinking_budget per tier_map entry;
#                 correction_keywords under [keywords];
#                 fail_open_tier bumped S3 -> S4 (quality over cost)

# ============================================================================
# Signal weights — each signal contributes weight × normalized value to the
# final score (which is clamped to [0.0, 1.0] and mapped to a tier).
# Guardrails push above this baseline via hard minimum-score overrides.
# Sum ~1.0; intentionally slightly over to allow multi-signal tasks to score high.
# ============================================================================
[weights]
prompt_length = 0.06     # GEPA 2026-04-12: cut from 0.10 — length ≠ complexity
code_blocks = 0.12       # GEPA: cut from 0.15
file_refs = 0.20         # GEPA: raised from 0.18 — file refs remain strong signal
reasoning = 0.22         # GEPA: raised from 0.18 — strongest S3/S4 discriminator
multi_step = 0.13        # GEPA: raised from 0.08 — S3 prompts describe multi-step work
ambiguity = 0.03         # GEPA: cut from 0.04 — near-zero information
tool_calls = 0.04        # GEPA: cut from 0.05
context_size = 0.10      # GEPA: cut from 0.12
code_action = 0.14       # GEPA: raised from 0.12 — code modification intent
system_scope = 0.16      # GEPA: raised from 0.15 — breadth markers

# ============================================================================
# Signal normalization caps — what value saturates each signal at 1.0
# Lowered caps => signals saturate faster => short prompts with real signals
# can still reach higher tiers without requiring long prose
# ============================================================================
[normalization]
prompt_length_cap = 400          # prompt tokens; >=400 saturates
code_blocks_cap = 2              # 2+ code blocks = full signal
file_refs_cap = 3                # 3+ file refs = full signal
reasoning_cap = 3                # 3+ reasoning keyword matches = full signal
multi_step_cap = 2
ambiguity_cap = 2
tool_calls_cap = 3
context_tokens_cap = 150000      # 150K context saturates (forces escalation)
code_action_cap = 2              # 2+ code action verb matches = full signal
system_scope_cap = 2             # 2+ scope markers = full signal

# ============================================================================
# Tier thresholds — score must be strictly less than the boundary to fall
# into that tier. S5 = anything >= s4_max.
# ============================================================================
[thresholds]
s0_max = 0.09    # GEPA: raised from 0.08
s1_max = 0.16    # GEPA: lowered from 0.18
s2_max = 0.22    # GEPA: lowered from 0.25 — widens S3 catchment from below
s3_max = 0.32    # GEPA: lowered from 0.35 — tightens S3 from above, reduces S3→S4 over-routing
s4_max = 0.55    # was 0.80 — now S4 = [0.35, 0.55), reachable at score 0.363-0.400

# ============================================================================
# Tier → model + effort mapping
# Model aliases: haiku, sonnet, opus, opus[1m], sonnet[1m], opusplan
# Effort levels: low, medium, high, max  (max = Opus 4.6 only)
# ============================================================================
[tier_map.S0]
model = "haiku"
effort = "low"
extended_thinking_budget = 0
description = "Trivial — lookups, status checks, one-line commands"

[tier_map.S1]
model = "haiku"
effort = "medium"
extended_thinking_budget = 0
description = "Light — short factual Q, formatting, simple summaries"

[tier_map.S2]
model = "sonnet"
effort = "medium"
extended_thinking_budget = 0
description = "Standard — single-file edits, Python scripts, docs"

[tier_map.S3]
model = "sonnet"
effort = "high"
extended_thinking_budget = 16000
description = "Heavy — multi-step work, moderate debugging, research summaries (extended thinking enabled)"

[tier_map.S4]
model = "opus"
effort = "high"
extended_thinking_budget = 32000
description = "Critical — architecture, multi-file refactor, novel debugging, synthesis"

[tier_map.S5]
model = "opus[1m]"
effort = "max"
extended_thinking_budget = 64000
description = "Ultra — 1M context workloads, overnight unattended runs, UE5 full-system work"

