    "root cause",
    "diagnose",
    "exponential backoff",
]
min_score = 0.40   # S4 floor after 2026-04-12 threshold redistribution (was S3 at old boundaries)

# ----- Complex design patterns: novel architecture signals => S4 floor -----
# Audit 2026-04-11 round 2: catches 5 of 7 remaining wrong routings in S2/S3→S4.
# These keywords appear ONLY in genuinely complex architecture prompts, never in
# simple code edits — verified against all 23 passing golden set prompts.
[guardrails.complex_design_floor]
description = "Complex design patterns (novel architecture) => S4 floor"
keywords = [
    "graceful degradation",
    "fallback chain",
    "offline fallback",
    "fallback mode",
    "tiered degradation",
    "degradation mode",
    "multi-tier",
    "parallel dispatch",
    "atomically",
    "atomic write",
    "hybrid",
    "tokenizer",
    "tiered memory",
    "tiered system",
    "memory system",
    "schema validation",
    "validate against a schema",
    "state machine design",
    "dispatch system",
]
min_score = 0.35   # S4 floor (was 0.55 — lowered to match new s3_max threshold)

# ----- Design from scratch: "design" + "from scratch" compound => S4 floor -----
# Catches ground-up system architecture tasks that system_scope_floor (S3) under-routes.
[guardrails.design_from_scratch]
description = "Design + from scratch => S4 floor (novel system architecture)"
keywords = ["from scratch"]
regex = ["(?i)\\bdesign\\b"]
require_all = true
min_score = 0.35   # S4 floor (was 0.55 — lowered to match new s3_max threshold)

# ----- Overnight sweep: "overnight" is definitionally S5 -----
[guardrails.overnight_sweep]
description = "Overnight task => S5 floor (long-running batch, definitionally max-tier)"
keywords = ["overnight"]
min_score = 0.85   # S5 floor

# ----- Full codebase sweep: "every" + file reference => S4 floor -----
# Catches "read every file under X" or "review every skill in ~/.claude/skills"
[guardrails.full_sweep_floor]
description = "Full sweep (every + file ref) => S4 floor"
keywords = ["every"]
min_file_refs = 1
require_all = true
min_score = 0.35   # S4 floor (was 0.55 — lowered to match new s3_max threshold)

# ----- Multi-concern floor: 3+ comma-separated concerns after em-dash, colon, or "with" -----
# Structural detection: prompts like "implement X — verify A, update B, send C" or
# "create Y with subprocess management, graceful shutdown, orphan prevention"
# These are always S3+ multi-step tasks. Regex-based, not keyword-based.
# Audit 2026-04-11: catches the comma-chain pattern that keywords structurally cannot.
[guardrails.multi_concern_floor]
description = "3+ comma-separated concerns => S3 floor (structural multi-step detection)"
regex = ["(?i)(\u2014\\s*\\w+.+,.+,|:\\s*\\w+.+,.+,.+|\\bwith\\s+\\w+.+,.+,.+|\\bthat\\s+\\w+.+,.+,)"]
min_score = 0.35   # S3 floor

# ----- Large volume floor: tasks describing 10+ files/pages/lines => S5 floor -----
# Catches "read 18 files", "46K+ lines", "2700+ pages", "29 skill files".
# These definitionally require long-context (1M) processing.
[guardrails.large_volume_floor]
description = "Large volume (10+ files/pages/lines/modules) => S5 floor"
regex = ["(?i)\\b(\\d{2,}|[\\d.]+[Kk])\\+?\\s*(files|pages|lines|modules|skills|checks|documents|chapters)"]
keywords = ["every file", "every page", "entire corpus", "full ecosystem"]
min_score = 0.55   # S5 floor

# ----- UE5 cross-system debug: UE5 domain term + investigation verb => S4 floor -----
# Audit 2026-04-11 round 3: "AnimBP T-posing when replicating — trace across blueprint,
# skeletal mesh, replication graph" was routing S3 but is S4 cross-system debug work.
# Fires ONLY when both a UE5-specific debug term AND an investigation verb are present.
[guardrails.ue5_debug_floor]
description = "UE5 cross-system debug (domain term AND investigation verb) => S4 floor"
domain_tags = ["ue5"]  # v2.4: UE5-specific debug only in UE5 project context
keywords = [
    "AnimBP",
    "skeletal mesh",
    "T-pose",
    "T-posing",
    "blueprint graph",
    "replication graph",
    "movement component",
    "animation blueprint",
    "anim graph",
    "blend space",
    "montage",
]
regex = ["(?i)(trace the|trace.*root cause|root cause.*across|diagnose.*across|across.*blueprint|across.*skeletal|across.*replication)"]
require_all = true
min_score = 0.35   # S4 floor (was 0.55 — lowered to match new s3_max threshold)

