# ============================================================================
# Hard guardrails — force score to at least min_score when ANY condition fires.
# These enforce the four quality cliffs from Agent E research.
# Each guardrail can combine: keywords (OR), min_file_refs, min_context_tokens, regex.
# ============================================================================

[guardrails.gpqa_hard_reasoning]
description = "GPQA Diamond cliff (-17.2pts Opus->Sonnet) — hard science / formal reasoning"
keywords = [
    "prove",
    "theorem",
    "quantum",
    "particle physics",
    "complexity analysis",
    "big-o",
    "formal proof",
    "first principles",
    "fundamental",
    "differential equation",
    "topology",
    "cryptographic proof",
    "lemma",
    "corollary",
    "axiom",
]
min_score = 0.85

# ----- Multi-file refactor: 3+ file refs alone forces Opus (any domain) -----
[guardrails.multi_file_refactor]
description = "3+ file refs => multi-file work, Aider polyglot cliff (Opus floor)"
min_file_refs = 3
min_score = 0.35   # S4 floor (was 0.80 — "Opus floor" = S4, not S5; lowered to match s3_max)

# ----- UE5 code work: UE5 keyword + file ref BOTH required (AND logic) -----
# This prevents over-firing on factual questions like "what does UPROPERTY mean"
[guardrails.ue5_code_work]
description = "UE5 code work (keyword AND file ref) => Opus (UE5 C++ complexity)"
domain_tags = ["ue5"]  # v2.4: only fires when CWD is a UE5 project (fixes cross-project false positives)
keywords = [
    "UPROPERTY",
    "UCLASS",
    "UFUNCTION",
    ".uproject",
    "UE5",
    "UE 5",
    "unreal engine",
    "sworder",
]
min_file_refs = 1
require_all = true
min_score = 0.80

# ----- UE5 mention floor: mentioning UE5 alone => at least Sonnet (not Haiku) -----
[guardrails.ue5_mention_floor]
description = "Any UE5 mention floors to Sonnet (Haiku is wrong for any UE5 context)"
domain_tags = ["ue5"]  # v2.4: suppress in non-UE5 projects (mentioning Sworder in Toke is meta-discussion)
keywords = [
    "UPROPERTY",
    "UCLASS",
    "UFUNCTION",
    ".uproject",
    "UE5",
    "UE 5",
    "unreal engine",
    "sworder",
]
min_score = 0.22   # S2 floor

# ----- Code edit floor: any code-action verb + file ref -> Sonnet floor -----
# Closes the "short code-edit prompts under-route to Haiku" gap.
# Require BOTH a code verb AND a file reference (via require_all) to avoid false positives.
[guardrails.code_edit_floor]
description = "Code edit (verb + file ref) => Sonnet floor (Haiku fails Aider polyglot hard)"
keywords = [
    "update the",
    "modify the",
    "fix the",
    "change the",
    "add the",
    "add a",
    "add an",
    "remove the",
    "rewrite the",
    "edit the",
    "write a",
    "create a",
    "implement a",
]
min_file_refs = 1
require_all = true
min_score = 0.22   # S2 floor

