# ----- Long prompt floor: substantive prompts (800+ chars) cannot be S0/S1 -----
# ----- Short action prompt floor: "add X to Y", "make X work", "support X from Y" -----
# Eval 2026-04-11 golden_set: 28 S3/S4 prompts misclassified S0 because they describe
# multi-step work in short sentences without articles ("add caching" not "add a caching").
# Regex catches: verb + word + ... + preposition pattern. S2 floor ensures LLM fallback fires.
[guardrails.short_action_floor]
description = "Short action prompt (verb + object + preposition) => S2 floor"
regex = ["(?i)\\b(add|make|support|wire|log|batch|enable|track)\\s+\\w+.*\\b(to the|to all|for the|for new|from|with|when|without|on the|and sync|and flush)\\b"]
min_score = 0.22

[guardrails.long_prompt_floor]
description = "Prompts with 800+ chars are substantive — Sonnet floor prevents Haiku routing"
regex = ["(?s).{800,}"]
min_score = 0.22   # S2 floor — long keyword-sparse prompts still get Sonnet minimum

