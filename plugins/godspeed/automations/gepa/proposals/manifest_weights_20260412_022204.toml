# - multi_step: number of sequential orchestration steps (0-1)
# - prompt_length: raw character/token length (0-1 normalized)
# - reasoning: explicit design/architecture/analysis requirements (0-1)
# - system_scope: breadth of system components touched (0-1)
# - tool_calls: number of external tool dependencies (0-1)

# TIER INTERPRETATION GUIDE:
# S0: Trivial single-action queries, no implementation
# S1: Simple localized changes, <1 file, <30 min scope
# S2: Moderate complexity, 1-3 files, single-concern refactor, <2 hours
# S3: Complex multi-step work, 3+ files, cross-concern orchestration, architectural decisions, >2 hours
# S4: Extensive refactoring, system redesign, 5+ files, 4+ sequential steps

# CRITICAL GUARDRAILS:
# - code_generation tasks (code_action > 0.3): apply floor at S2 minimum
# - reasoning-heavy prompts (reasoning > 0.30): floor at S3 minimum
# - multi-step orchestration (multi_step > 0.4): do not classify below S3
